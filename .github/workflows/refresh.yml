name: refresh-radar

on:
  schedule:
    - cron: "0 6 * * *"      # every day at 06:00 UTC
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write             # to commit the accumulating job-ad history
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build dashboard
        env:
          CH_API_KEY: ${{ secrets.CH_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          CQC_KEY: ${{ secrets.CQC_KEY }}
        run: python pull_and_build.py

      - name: Save job-ad history
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add -A data || true
          git commit -m "update job-ad history" || echo "no changes to commit"
          git push || echo "nothing to push"

      - name: Assemble site
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
